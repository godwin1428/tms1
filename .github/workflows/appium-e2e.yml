name: Appium E2E Android Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-latest # Apple Silicon (M1) runners provide instant booting with aarch64 emulators

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install NPM Dependencies & Build Capacitor
      run: |
        npm install
        npx cap sync android

    - name: Build Android APK
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug
      
    - name: Install Appium & Drivers
      run: |
        npm install -g appium@next
        appium driver install uiautomator2

    - name: Install Python Test Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Appium-Python-Client selenium openpyxl pandas

    - name: Run Appium Tests on Emulator
      uses: reactivecircus/android-emulator-runner@v2
      env:
        CI_APK_PATH: ${{ github.workspace }}/android/app/build/outputs/apk/debug/app-debug.apk
      with:
        api-level: 34
        target: google_apis
        arch: aarch64
        profile: pixel_5
        disable-animations: true
        script: |
          # Start Appium Server securely with autodownload in background
          appium --allow-insecure uiautomator2:chromedriver_autodownload &
          sleep 10
          
          # Execute the test suite
          python tests/appium_e2e_suite.py

    - name: Upload Excel Report as Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-test-report
        path: E2E_Test_Report_TMS_*.xlsx
