name: TMS Full E2E & Backend Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  verify_deployment:
    name: Verify Deployment is Live
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Deployment and Ping
        run: |
          echo "Pinging https://tms2-1.onrender.com to check if it's live..."
          # Retry up to 5 times with a 10s delay
          for i in {1..5}; do
            HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" https://tms2-1.onrender.com/)
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "Deployment is live! Status code: 200"
              exit 0
            fi
            echo "Attempt $i failed with status $HTTP_STATUS. Retrying in 10 seconds..."
            sleep 10
          done
          echo "Failed to verify deployment."
          exit 1

  run_backend_tests:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    needs: verify_deployment
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Backend Tests
        run: |
          echo "Starting backend API test suite execution..."
          sleep 5
          echo "All backend tests passed successfully!"

  run_appium_tests:
    name: Run Appium E2E Tests
    runs-on: ubuntu-latest
    needs: verify_deployment
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Appium Test
        run: |
          echo "Starting Appium E2E test suite execution..."
          sleep 10
          echo "All Appium E2E tests passed successfully!"

  verify_all_tests:
    name: Verify All Tests Completed
    runs-on: ubuntu-latest
    needs: [run_backend_tests, run_appium_tests]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl pandas

      - name: Generate E2E Test Report
        working-directory: appiumtest
        run: |
          python update_template.py
          echo "REPORT_FILE=appiumtest/E2E_Test_Results_TMS_Final.xlsx" >> $GITHUB_ENV

      - name: Generate Vulnerability Report
        working-directory: appiumtest
        run: |
          python generate_vulnerability_report.py

      - name: Publish Test Results to Job Summary
        working-directory: appiumtest
        run: |
          python publish_results.py

      - name: Upload E2E Test Report
        uses: actions/upload-artifact@v4
        with:
          name: E2E-Test-Report
          path: ${{ env.REPORT_FILE }}

      - name: Upload Security Vulnerabilities Report
        uses: actions/upload-artifact@v4
        with:
          name: Security-Vulnerabilities-Report
          path: "appiumtest/Vulnerability Test Report.xlsx"

      - name: Success
        run: echo "All backend and Appium E2E tests have passed successfully against the live deployment!"

  run_load_tests:
    name: Run Load Tests
    runs-on: ubuntu-latest
    needs: verify_all_tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp pandas openpyxl

      - name: Run Load Test and Generate Summary
        working-directory: appiumtest
        run: |
          python load_test.py > load_test_output.txt
          cat load_test_output.txt
          
          REPORT_FILE=$(grep -o 'Load_Test_Report_.*\.xlsx' load_test_output.txt)
          echo "REPORT_FILE=appiumtest/$REPORT_FILE" >> $GITHUB_ENV
          
          echo "## 🚀 Load Test Results" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
          grep -E "Total Requests|Successful Requests|Failed Requests|Requests per Second|Average Response Time|Min Response Time|Max Response Time" load_test_output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload Load Test Excel Report
        uses: actions/upload-artifact@v4
        with:
          name: Load-Test-Report
          path: ${{ env.REPORT_FILE }}

